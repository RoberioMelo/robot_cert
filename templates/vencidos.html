  <main class="main-content">
    <header class="page-header">
      <h1>Certificados Vencidos</h1>
      <p>Lista de certificados vencidos, com filtro por período de vencimento.</p>
    </header>

    <div class="table-container">
      <div class="toolbar">
        <div class="toolbar__status">
          <p id="status-msg" class="status-line"></p>
          <p class="hint" id="count-hint"></p>
        </div>
        <div class="toolbar__actions">
          <label for="dt-inicio" class="hint">De</label>
          <input type="date" id="dt-inicio" class="path-input" style="max-width: 170px;" />
          <label for="dt-fim" class="hint">Até</label>
          <input type="date" id="dt-fim" class="path-input" style="max-width: 170px;" />
          <button type="button" id="btn-filtrar" class="primary">Filtrar</button>
        </div>
      </div>

      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>CNPJ/CPF</th>
              <th>Vencimento do certificado</th>
            </tr>
          </thead>
          <tbody id="tbody-vencidos"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/static/ui-common.js"></script>
  <script>
    function esc(v) {
      const d = document.createElement("div");
      d.textContent = v == null ? "" : String(v);
      return d.innerHTML;
    }

    function fmtDataUtc(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("pt-BR", { timeZone: "UTC" }) + " UTC";
    }

    function anoAtualRange() {
      const y = new Date().getFullYear();
      document.getElementById("dt-inicio").value = `${y}-01-01`;
      document.getElementById("dt-fim").value = `${y}-12-31`;
    }

    async function carregarVencidos() {
      const st = document.getElementById("status-msg");
      st.textContent = "A carregar…";
      const inicio = document.getElementById("dt-inicio").value;
      const fim = document.getElementById("dt-fim").value;
      const qs = new URLSearchParams();
      if (inicio) qs.set("data_inicio", inicio);
      if (fim) qs.set("data_fim", fim);

      const r = await fetch(`/api/certificados/vencidos?${qs.toString()}`, { headers: getHeaders() });
      if (!r.ok) {
        st.textContent = `Erro ${r.status}: ${await mensagemCorpoErro(r)}`;
        return;
      }
      const j = await r.json();
      const itens = j.itens || [];
      document.getElementById("count-hint").textContent = `${itens.length} vencido(s) exibido(s)`;
      st.textContent = `Snapshots lidos: ${j.snapshots_lidos || 0}`;
      const tb = document.getElementById("tbody-vencidos");
      tb.innerHTML = itens.map((it) => `
        <tr>
          <td>${esc(it.nome)}</td>
          <td>${esc(it.documento || "—")}</td>
          <td>${esc(fmtDataUtc(it.vencimento_certificado))}</td>
        </tr>
      `).join("");
    }

    document.getElementById("btn-filtrar").addEventListener("click", carregarVencidos);

    (async function init() {
      const role = localStorage.getItem("user_role");
      if (role === "admin") {
        const elUsers = document.getElementById("nav-users");
        const elConfig = document.getElementById("nav-config");
        if (elUsers) elUsers.style.display = "flex";
        if (elConfig) elConfig.style.display = "flex";
      }
      anoAtualRange();
      await carregarVencidos();
    })();
  </script>
