<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usuários — CertGuard</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        .user-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        .user-table th, .user-table td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        .user-table th { background: var(--bg); color: var(--text-light); font-weight: 500; font-size: 0.85rem; text-transform: uppercase; }
        .role-badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .role-admin { background: #fee2e2; color: #dc2626; }
        .role-user { background: #dcfce7; color: #16a34a; }
        .row-actions { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .btn-action { border: 1px solid var(--border); background: white; border-radius: 6px; padding: 0.35rem 0.55rem; font-size: 0.8rem; cursor: pointer; }
        .btn-action:hover { background: var(--bg); }
        .btn-danger { border-color: #fecaca; color: #b91c1c; }
        .role-disabled { background: #f3f4f6; color: #4b5563; }
        .users-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
            </div>
            <div class="brand-text">
                <h2>CertGuard</h2>
                <span>Monitor de Certificados</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
              </svg>
              Dashboard
            </a>
            <a href="/usuarios" class="active" id="nav-users" style="display: none;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
              </svg>
              Usuários
            </a>
            <a href="/configuracao" id="nav-config" style="display: none;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />

              Configuração
            </a>
            <a href="#" onclick="logout()" style="margin-top: auto; color: #dc2626;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />

              Sair

        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <h1>Gestão de Usuários</h1>
            <p>Adicione ou remova membros da equipe com acesso ao portal.</p>
        </header>

        <section class="doc-block">
            <h2>Novo Usuário</h2>
            <div class="panel--nested">
                <form id="create-user-form" class="row-inline" style="flex-wrap: wrap; gap: 1rem;">
                    <input type="text" id="new-name" placeholder="Nome Completo" required class="path-input" style="flex: 1; min-width: 200px;">
                    <input type="email" id="new-email" placeholder="E-mail" required class="path-input" style="flex: 1; min-width: 200px;">
                    <input type="password" id="new-password" placeholder="Senha" required class="path-input" style="flex: 1; min-width: 150px;">
                    <select id="new-role" class="path-input" style="min-width: 120px;">
                        <option value="user">Usuário</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button type="submit" class="primary">Adicionar</button>
                </form>
                <p id="msg-create" class="hint" style="margin-top: 1rem;"></p>
            </div>
        </section>

        <section class="doc-block">
            <h2>Usuários Ativos</h2>
            <div class="users-toolbar">
                <input type="search" id="user-search" class="path-input" style="max-width: 320px;" placeholder="Pesquisar por nome ou e-mail" />
                <select id="user-role-filter" class="path-input" style="max-width: 180px;">
                    <option value="todos">Nível: Todos</option>
                    <option value="admin">Nível: Admin</option>
                    <option value="user">Nível: Usuário</option>
                </select>
                <select id="user-status-filter" class="path-input" style="max-width: 220px;">
                    <option value="todos">Status: Todos</option>
                    <option value="ativo">Status: Ativo</option>
                    <option value="desativado">Status: Desativado</option>
                </select>
                <span class="hint" id="users-count"></span>
            </div>
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Nível</th>
                        <th>Criado em</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="user-list-body">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="/static/ui-common.js"></script>
    <script>
        let usersCache = [];

        function esc(v) {
            const d = document.createElement('div');
            d.textContent = v == null ? '' : String(v);
            return d.innerHTML;
        }

        function roleLabel(role) {
            const r = String(role || '').toLowerCase();
            if (r === 'admin') return 'ADMIN';
            if (r === 'disabled') return 'DESATIVADO';
            return 'USUÁRIO';
        }

        function roleClass(role) {
            const r = String(role || '').toLowerCase();
            if (r === 'admin') return 'role-admin';
            if (r === 'disabled') return 'role-disabled';
            return 'role-user';
        }

        function renderUsers() {
            const body = document.getElementById('user-list-body');
            const q = (document.getElementById('user-search').value || '').trim().toLowerCase();
            const roleFilter = (document.getElementById('user-role-filter').value || 'todos').toLowerCase();
            const statusFilter = (document.getElementById('user-status-filter').value || 'todos').toLowerCase();
            const users = usersCache.filter((u) => {
                const role = String(u.role || '').toLowerCase();
                const isDisabled = role === 'disabled';

                if (roleFilter !== 'todos' && role !== roleFilter) return false;
                if (statusFilter === 'ativo' && isDisabled) return false;
                if (statusFilter === 'desativado' && !isDisabled) return false;

                if (!q) return true;
                const hay = [u.full_name || '', u.email || ''].join(' ').toLowerCase();
                return hay.includes(q);
            });
            document.getElementById('users-count').textContent = `${users.length} usuário(s) encontrado(s)`;
            body.innerHTML = users.map(u => `
                <tr>
                    <td><strong>${esc(u.full_name || '—')}</strong></td>
                    <td>${esc(u.email)}</td>
                    <td><span class="role-badge ${roleClass(u.role)}">${roleLabel(u.role)}</span></td>
                    <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</td>
                    <td>
                        <div class="row-actions">
                            <button class="btn-action" onclick="editarUsuario('${u.id}')">Editar</button>
                            <button class="btn-action" onclick="redefinirSenha('${u.id}')">Redefinir senha</button>
                            ${String(u.role || '').toLowerCase() !== 'disabled'
                                ? `<button class="btn-action btn-danger" onclick="desativarUsuario('${u.id}')">Desativar</button>`
                                : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function loadUsers() {
            try {
                const r = await fetch('/api/users', { headers: getHeaders() });
                if (!r.ok) return;
                usersCache = await r.json();
                renderUsers();
            } catch (e) { console.error(e); }
        }

        async function editarUsuario(id) {
            const user = usersCache.find((u) => u.id === id);
            if (!user) return;
            const full_name = prompt('Nome completo:', user.full_name || '');
            if (full_name === null) return;
            const email = prompt('E-mail:', user.email || '');
            if (email === null) return;
            const roleAtual = String(user.role || 'user').toLowerCase();
            const role = prompt('Nível (admin | user | disabled):', roleAtual);
            if (role === null) return;
            const r = await fetch(`/api/users/${id}`, {
                method: 'PUT',
                headers: getHeaders(true),
                body: JSON.stringify({
                    full_name: full_name.trim(),
                    email: email.trim(),
                    role: role.trim().toLowerCase(),
                }),
            });
            if (!r.ok) {
                alert('Erro ao editar usuário: ' + (await mensagemCorpoErro(r)));
                return;
            }
            await loadUsers();
        }

        async function redefinirSenha(id) {
            const nova = prompt('Digite a nova senha (mínimo 6 caracteres):');
            if (nova === null) return;
            const r = await fetch(`/api/users/${id}/reset-password`, {
                method: 'POST',
                headers: getHeaders(true),
                body: JSON.stringify({ password: nova }),
            });
            if (!r.ok) {
                alert('Erro ao redefinir senha: ' + (await mensagemCorpoErro(r)));
                return;
            }
            alert('Senha redefinida com sucesso.');
        }

        async function desativarUsuario(id) {
            if (!confirm('Deseja realmente desativar este usuário?')) return;
            const r = await fetch(`/api/users/${id}/deactivate`, {
                method: 'POST',
                headers: getHeaders(true),
            });
            if (!r.ok) {
                alert('Erro ao desativar usuário: ' + (await mensagemCorpoErro(r)));
                return;
            }
            await loadUsers();
        }

        document.getElementById('create-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg-create');
            const data = {
                full_name: document.getElementById('new-name').value,
                email: document.getElementById('new-email').value,
                password: document.getElementById('new-password').value,
                role: document.getElementById('new-role').value
            };

            const r = await fetch('/api/users', {
                method: 'POST',
                headers: getHeaders(true),
                body: JSON.stringify(data)
            });

            if (r.ok) {
                msg.textContent = "Usuário criado com sucesso!";
                msg.style.color = "var(--ok)";
                e.target.reset();
                loadUsers();
            } else {
                msg.textContent = "Erro ao criar: " + (await mensagemCorpoErro(r));
                msg.style.color = "var(--danger)";
            }
        });

        document.getElementById('user-search').addEventListener('input', renderUsers);
        document.getElementById('user-role-filter').addEventListener('change', renderUsers);
        document.getElementById('user-status-filter').addEventListener('change', renderUsers);

        // Verificar permissão e visibilidade do menu
        const role = localStorage.getItem('user_role');
        if (role !== 'admin') {
            alert('Acesso negado.');
            window.location.href = '/';
        } else {
            const elUsers = document.getElementById('nav-users');
            const elConfig = document.getElementById('nav-config');
            if (elUsers) elUsers.style.display = 'flex';
            if (elConfig) elConfig.style.display = 'flex';
            loadUsers();
        }
    </script>
</body>
</html>
