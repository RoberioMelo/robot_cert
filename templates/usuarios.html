<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usuários — Certificados PFX</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      .user-form {
        display: flex;
        gap: 1rem;
        align-items: flex-end;
        flex-wrap: wrap;
        margin-bottom: 2rem;
        padding: 1.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .user-form .row {
        flex: 1;
        min-width: 200px;
      }
      .user-form label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }
      .user-form input, .user-form select {
        width: 100%;
        padding: 0.5rem;
      }
      .table-actions button {
        padding: 0.25rem 0.5rem;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
          </svg>
        </div>
        <div class="brand-text">
          <h2>Certificados PFX</h2>
          <span>Monitor de Certificados</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
          Dashboard
        </a>
        <a href="/configuracao" class="admin-only" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Configuração / Agente
        </a>
        <a href="/usuarios" class="active admin-only" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
          </svg>
          Usuários
        </a>
        <a href="#" onclick="logout(); return false;" style="margin-top: auto; color: var(--danger);">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
          </svg>
          Sair
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1>Gestão de Usuários</h1>
        <p>Adicione ou remova pessoas com acesso ao painel de certificados.</p>
      </header>

      <form class="user-form" id="form-user">
        <div class="row">
          <label for="new-email">E-mail</label>
          <input type="email" id="new-email" class="path-input" required placeholder="novo@empresa.com" autocomplete="off">
        </div>
        <div class="row">
          <label for="new-password">Senha</label>
          <input type="password" id="new-password" class="path-input" required placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="row" style="min-width: 150px;">
          <label for="new-role">Nível de Acesso</label>
          <select id="new-role" class="path-input" required>
            <option value="user">Usuário</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <div class="row" style="flex: 0;">
          <button type="submit" class="primary" id="btn-add">Cadastrar</button>
        </div>
      </form>
      <p id="msg" class="hint" style="margin-top: -1rem; margin-bottom: 2rem;"></p>

      <div class="table-container">
        <div style="overflow-x: auto">
          <table>
            <thead>
              <tr>
                <th>E-mail</th>
                <th>Nível (Role)</th>
                <th>Data de Criação</th>
                <th style="width: 80px; text-align: center;">Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-users"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="/static/ui-common.js"></script>
    <script>
      async function carregarUsuarios() {
        const tb = document.getElementById("tbody-users");
        tb.innerHTML = "<tr><td colspan='4'>Carregando...</td></tr>";
        try {
          const r = await fetch("/api/users", { headers: getHeaders() });
          if (r.status === 401) {
            logout();
            return;
          }
          if (r.status === 403) {
            tb.innerHTML = "<tr><td colspan='4'>Acesso negado. Apenas administradores.</td></tr>";
            return;
          }
          const users = await r.json();
          tb.innerHTML = users.map(u => {
            const isSelf = false; // TODO verificar se é ele mesmo para impedir auto-exclusao?
            return `
              <tr>
                <td>${u.email}</td>
                <td><span class="badge ${u.role === 'admin' ? 'badge-ok' : 'badge-warning'}">${u.role}</span></td>
                <td>${new Date(u.created_at).toLocaleString("pt-BR")}</td>
                <td class="table-actions" style="text-align: center;">
                  <button type="button" class="danger" onclick="excluir('${u.id}')">Excluir</button>
                </td>
              </tr>
            `;
          }).join("");
          if (users.length === 0) tb.innerHTML = "<tr><td colspan='4'>Nenhum usuário encontrado.</td></tr>";
        } catch (e) {
          tb.innerHTML = "<tr><td colspan='4'>Erro de conexão.</td></tr>";
        }
      }

      async function excluir(id) {
        if (!confirm("Tem certeza que deseja excluir este usuário? O acesso será revogado na hora.")) return;
        try {
          const r = await fetch("/api/users/" + id, { method: "DELETE", headers: getHeaders() });
          if (r.ok) {
            carregarUsuarios();
          } else {
            alert(await mensagemCorpoErro(r));
          }
        } catch(e) {
          alert("Erro: " + e);
        }
      }

      document.getElementById("form-user").addEventListener("submit", async (e) => {
        e.preventDefault();
        const msg = document.getElementById("msg");
        msg.textContent = "Salvando...";
        msg.style.color = "var(--text-muted)";
        
        const body = {
            email: document.getElementById("new-email").value,
            password: document.getElementById("new-password").value,
            role: document.getElementById("new-role").value
        };

        try {
            const r = await fetch("/api/users", {
                method: "POST",
                headers: getHeaders(true),
                body: JSON.stringify(body)
            });
            if (r.ok) {
                msg.textContent = "Usuário cadastrado com sucesso!";
                msg.style.color = "var(--ok)";
                document.getElementById("form-user").reset();
                carregarUsuarios();
            } else {
                msg.textContent = "Erro: " + await mensagemCorpoErro(r);
                msg.style.color = "var(--danger)";
            }
        } catch(err) {
            msg.textContent = "Erro de conexão: " + err;
            msg.style.color = "var(--danger)";
        }
      });

      (async function init() {
        if (!getJwtToken()) {
            window.location.href = "/login";
            return;
        }
        if (getUserRole() === "admin") {
            document.querySelectorAll(".admin-only").forEach(el => el.style.display = "flex");
        } else {
            document.querySelector(".main-content").innerHTML = "<h1>Acesso Negado</h1><p>Você não tem permissão para acessar esta página.</p>";
            return;
        }
        await carregarUsuarios();
      })();
    </script>
  </body>
</html>
