<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Certificados PFX — Painel</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
          </svg>
        </div>
        <div class="brand-text">
          <h2>CertGuard</h2>
          <span>Monitor de Certificados</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
          Dashboard

        <a href="/usuarios" id="nav-users" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
          Usuários
        </a>
        <a href="/configuracao" id="nav-config" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Configuração
        </a>
        <a href="#" onclick="logout()" style="margin-top: auto; color: #dc2626;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
          </svg>
          Sair
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1>Painel de Certificados</h1>
        <p>Visão geral dos certificados digitais mapeados pelo agente.</p>
      </header>

      <!-- Resumo Dashboard Cards -->
      <div class="cards-grid">
        <div class="dashboard-card card-total">
          <div class="card-info">
            <span class="card-title">Total</span>
            <span class="card-number" id="n-tot">0</span>
          </div>
          <div class="card-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />
            </svg>
          </div>
        </div>

        <div class="dashboard-card card-validos">
          <div class="card-info">
            <span class="card-title">Válidos</span>
            <span class="card-number" id="n-ok">0</span>
          </div>
          <div class="card-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
            </svg>
          </div>
        </div>

        <div class="dashboard-card card-expirando">
          <div class="card-info">
            <span class="card-title">Expirando</span>
            <span class="card-number" id="n-exp-soon">0</span>
            <span class="card-subtitle">Próximos 30 dias</span>
          </div>
          <div class="card-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
        </div>

        <div class="dashboard-card card-vencidos">
          <div class="card-info">
            <span class="card-title">Vencidos</span>
            <span class="card-number" id="n-vencidos">0</span>
          </div>
          <div class="card-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Tabela -->
      <div class="table-container">
        <div class="toolbar">
          <div class="toolbar__status">
            <p id="status-msg" class="status-line"></p>
            <p class="hint" id="data-hint"></p>
            <p id="panel-hint" class="hint" style="display: none; color: #f59e0b;"></p>
          </div>
          <div class="toolbar__actions">
            <select id="filtro-status" title="Filtrar por status" style="padding: 0.55rem; border: 1px solid var(--border); border-radius: 8px;">
              <option value="todos">Todos</option>
              <option value="validos">Válidos</option>
              <option value="prestes_vencer">Prestes a vencer</option>
              <option value="vencidos">Vencidos</option>
            </select>
            <input
              type="search"
              id="busca-cert"
              placeholder="Buscar por nome, CNPJ ou CPF"
              title="Busca por nome do certificado, CNPJ/CPF com ou sem pontuação"
              style="padding: 0.55rem 0.7rem; min-width: 260px; border: 1px solid var(--border); border-radius: 8px;"
            />
            <button type="button" id="btn-refresh" class="primary">Atualizar tabela</button>
            <button type="button" id="btn-move" class="danger" title="Apenas se o processo do API tiver acesso às pastas no disco.">
              Mover vencidos
            </button>
          </div>
        </div>

        <div style="overflow-x: auto">
          <table>
            <thead>
              <tr>
                <th>Status</th>
                <th>Nome (titular)</th>
                <th>Emissão (UTC)</th>
                <th>Vencimento (UTC)</th>
                <th>CNPJ / CPF</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

    </main>

    <script src="/static/ui-common.js"></script>
    <script>
      const fonte = () => getDataFonte();
      let itensOriginais = [];

      const fmt = (iso) => {
        if (!iso) return "—";
        const d = new Date(iso);
        return d.toLocaleString("pt-BR", { timeZone: "UTC" }) + " UTC";
      };

      // Novo sistema de badges
      const badge = (s, isExpiringSoon) => {
        if (s === "ok") {
            if (isExpiringSoon) return '<span class="badge badge-warning">Expirando</span>';
            return '<span class="badge badge-ok">Válido</span>';
        }
        if (s === "expirado") return '<span class="badge badge-expired">Vencido</span>';
        if (s === "fora_do_padrao") return '<span class="badge badge-bad">Fora do Padrão</span>';
        if (s === "erro") return '<span class="badge badge-bad">Erro</span>';
        return '<span class="badge badge-bad">' + s + '</span>';
      };

      function setMoveButton(d) {
        const btn = document.getElementById("btn-move");
        const remoto = d.data_source === "remoto";
        btn.disabled = remoto;
        btn.title = remoto
          ? "Dados remotos: o movimento de ficheiros tem de ser feito no PC do agente (comando remoto) ou com o API a correr aí."
          : "Move ficheiros vencidos no disco a que o servidor acede.";
      }

      function esc(s) {
        if (!s) return "";
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function apenasDigitos(v) {
        return String(v || "").replace(/\D+/g, "");
      }

      function normalizarTexto(v) {
        return String(v || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      function atualizarCards(items) {
        let total = items.length;
        let okCount = 0;
        let expirandoCount = 0;
        let vencidosCount = 0;
        items.forEach((it) => {
          if (it.status === "expirado") {
            vencidosCount++;
          } else if (it.status === "ok") {
            if (it._isExpiringSoon) expirandoCount++;
            else okCount++;
          }
        });
        document.getElementById("n-tot").textContent = total;
        document.getElementById("n-ok").textContent = okCount;
        document.getElementById("n-exp-soon").textContent = expirandoCount;
        document.getElementById("n-vencidos").textContent = vencidosCount;
      }

      function renderTabela(items) {
        const colTipo = (it) => {
          const lbl = it.documento_tipo_label || (it.documento_tipo ? String(it.documento_tipo).toUpperCase() : "");
          if (lbl) {
            const f = it.documento_formatado || it.documento_numero || "";
            return (
              "<span class='doc-type-label'>" +
              esc(lbl) +
              "</span>" +
              (f ? "<span class='doc-type-num'>" + esc(f) + "</span>" : "")
            );
          }
          if (it.error_message) return "<span class='error-cell' style='color:#ef4444'>" + esc(it.error_message) + "</span>";
          return "—";
        };

        const tb = document.getElementById("tbody");
        tb.innerHTML = items
          .map(
            (it) =>
              "<tr><td>" +
              badge(it.status, it._isExpiringSoon) +
              "</td><td>" +
              esc(it.nome != null && it.nome !== "" ? it.nome : it.display_name) +
              "</td><td>" +
              fmt(it.not_before) +
              "</td><td>" +
              fmt(it.not_after) +
              "</td><td class='td-doc'>" +
              colTipo(it) +
              "</td></tr>"
          )
          .join("");
      }

      function aplicarFiltros() {
        const filtroStatus = document.getElementById("filtro-status")?.value || "todos";
        const busca = document.getElementById("busca-cert")?.value || "";
        const buscaTexto = normalizarTexto(busca.trim());
        const buscaDigitos = apenasDigitos(busca);

        let filtrados = itensOriginais.filter((it) => {
          if (filtroStatus === "validos") {
            if (!(it.status === "ok" && !it._isExpiringSoon)) return false;
          } else if (filtroStatus === "prestes_vencer") {
            if (!(it.status === "ok" && it._isExpiringSoon)) return false;
          } else if (filtroStatus === "vencidos") {
            if (it.status !== "expirado") return false;
          }

          if (!buscaTexto) return true;

          const alvoNome = normalizarTexto([it.nome, it.display_name, it.file_name].filter(Boolean).join(" "));
          const docNumerico = apenasDigitos(it.documento_numero || it.documento_formatado || "");

          if (alvoNome.includes(buscaTexto)) return true;
          if (buscaDigitos && docNumerico.includes(buscaDigitos)) return true;
          return false;
        });

        atualizarCards(filtrados);
        renderTabela(filtrados);
      }

      async function carregarTabela() {
        const st = document.getElementById("status-msg");
        const ph = document.getElementById("panel-hint");
        ph.style.display = "none";
        st.textContent = "A carregar…";
        try {
          const f = fonte();
          const r = await fetch("/api/certificados?fonte=" + encodeURIComponent(f), { headers: getHeaders() });
          if (r.status === 401) {
            logout(); // Se falhar por 401, token expirou ou é inválido
            return;
          }
          if (r.status === 404) {
            st.textContent = "Fonte “remoto”: ainda sem dados. Use “local”/“auto” em Configuração ou o agente no Windows.";
            return;
          }
          if (!r.ok) {
            st.textContent = "Erro " + r.status + ": " + (await mensagemCorpoErro(r));
            return;
          }
          let d;
          try {
            d = await r.json();
          } catch (jsonErr) {
            st.textContent = "Resposta inválida. Confirme o endereço do API. " + jsonErr;
            return;
          }
          st.textContent = "Atualizado em: " + new Date(d.atualizado_em).toLocaleString("pt-BR");
          document.getElementById("data-hint").textContent =
            "Fonte de dados: " + (d.data_source || "—") + (d.machine_id ? " | Servidor: " + d.machine_id : "");
          setMoveButton(d);
          
          const items = d.itens || [];
          
          // Cálculo de status
          let total = items.length;
          let okCount = 0;
          let expirandoCount = 0;
          let vencidosCount = 0;

          const now = new Date();
          const thirtyDaysFromNow = new Date();
          thirtyDaysFromNow.setDate(now.getDate() + 30);

          items.forEach(it => {
            // Verificar proximidade de expiração
            let isExpiringSoon = false;
            if (it.not_after) {
                const expiry = new Date(it.not_after);
                if (expiry <= thirtyDaysFromNow && expiry >= now) {
                    isExpiringSoon = true;
                }
            }
            
            // Grava uma flag no item para usar na tabela
            it._isExpiringSoon = isExpiringSoon;

            if (it.status === "expirado") {
                vencidosCount++;
            } else if (it.status === "ok") {
                if (isExpiringSoon) {
                    expirandoCount++;
                } else {
                    okCount++;
                }
            } else if (it.status === "fora_do_padrao" || it.status === "erro") {
                // Outros status não contam pros 3 principais além de 'total'
            }
          });

          itensOriginais = items;
          aplicarFiltros();
        } catch (e) {
          st.textContent = "Erro: " + e;
        }
      }

      document.getElementById("btn-refresh").addEventListener("click", carregarTabela);
      document.getElementById("filtro-status").addEventListener("change", aplicarFiltros);
      document.getElementById("busca-cert").addEventListener("input", aplicarFiltros);
      document.getElementById("btn-move").addEventListener("click", async () => {
        if (!confirm("Tem a certeza que deseja mover os ficheiros vencidos na pasta remota?")) return;
        const st = document.getElementById("status-msg");
        st.textContent = "A mover…";
        try {
          const r = await fetch("/api/mover-vencidos", { method: "POST", headers: getHeaders() });
          if (r.status === 401) {
            st.textContent = "401: chave em Configuração.";
            return;
          }
          if (!r.ok) {
            st.textContent = "Erro " + r.status + ": " + (await mensagemCorpoErro(r));
            return;
          }
          const d = await r.json();
          st.textContent =
            "Movidos: " + (d.total_movidos != null ? d.total_movidos : 0) + (d.erros && d.erros.length ? " (ver resposta API)" : "");
          await carregarTabela();
        } catch (e) {
          st.textContent = "Erro: " + e;
        }
      });

      window.addEventListener("storage", (ev) => {
        if (ev.key === "cert_robot_data_fonte" || ev.key === KEY_STORAGE) {
          const ph = document.getElementById("panel-hint");
          if (ev.key === "cert_robot_data_fonte") {
            ph.textContent = "A fonte dos dados foi alterada noutro separador. Clique em “Atualizar tabela” para refletir.";
            ph.style.display = "block";
          }
        }
      });

      (async function init() {
        // Controle de visibilidade do menu lateral
        const role = localStorage.getItem('user_role');
        if (role === 'admin') {
            const elUsers = document.getElementById('nav-users');
            const elConfig = document.getElementById('nav-config');
            if (elUsers) elUsers.style.display = 'flex';
            if (elConfig) elConfig.style.display = 'flex';
        }

        await carregarTabela();
      })();
    </script>
  </body>
</html>
