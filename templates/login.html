<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — Certificados PFX</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: var(--bg);
      }
      .login-container {
        background-color: var(--surface);
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 400px;
        border: 1px solid var(--border);
      }
      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .login-header .brand-icon {
        background: var(--accent);
        color: white;
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
      }
      .login-header .brand-icon svg {
        width: 28px;
        height: 28px;
      }
      .login-header h1 {
        font-size: 1.5rem;
        margin: 0;
        color: var(--text-dark);
      }
      .login-header p {
        color: var(--text-muted);
        margin: 0.5rem 0 0;
        font-size: 0.9rem;
      }
      .login-form .row {
        margin-bottom: 1.5rem;
      }
      .login-form label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-dark);
      }
      .login-form input {
        width: 100%;
        box-sizing: border-box;
      }
      .login-btn {
        width: 100%;
        padding: 0.875rem;
        font-size: 1rem;
        justify-content: center;
      }
      #login-error {
        color: var(--danger);
        text-align: center;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
        </div>
        <h1>CertGuard</h1>
        <p>Faça login para acessar o painel</p>
      </div>

      <div id="login-error">Credenciais inválidas.</div>

      <form class="login-form" id="login-form">
        <div class="row">
          <label for="username">E-mail</label>
          <input type="email" id="username" name="username" class="path-input" required placeholder="admin@empresa.com" autocomplete="username">
        </div>
        <div class="row">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" class="path-input" required placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="primary login-btn" id="btn-submit">Entrar</button>
      </form>
    </div>

    <script src="/static/ui-common.js"></script>
    <script>
      // Redireciona se já estiver logado
      if (getJwtToken()) {
        window.location.href = "/";
      }

      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btn-submit");
        const err = document.getElementById("login-error");
        btn.textContent = "Entrando...";
        btn.disabled = true;
        err.style.display = "none";

        const formData = new URLSearchParams();
        formData.append("username", document.getElementById("username").value);
        formData.append("password", document.getElementById("password").value);

        try {
          const r = await fetch("/api/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded"
            },
            body: formData.toString()
          });

          if (!r.ok) {
            err.textContent = r.status === 401 ? "E-mail ou senha incorretos." : "Erro de servidor.";
            err.style.display = "block";
            btn.textContent = "Entrar";
            btn.disabled = false;
            return;
          }

          const j = await r.json();
          setJwtToken(j.access_token);
          
          // Extrair role e salvar no localStorage (decodificando JWT)
          try {
            const payload = JSON.parse(atob(j.access_token.split('.')[1]));
            if (payload.role) {
                localStorage.setItem(ROLE_STORAGE, payload.role);
            }
          } catch(e) {}

          window.location.href = "/";
        } catch (error) {
          err.textContent = "Erro de conexão com o servidor.";
          err.style.display = "block";
          btn.textContent = "Entrar";
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
