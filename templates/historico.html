  <main class="main-content">
    <header class="page-header">
      <h1>Histórico de Certificados</h1>
      <p>Certificados já mapeados em algum momento e a última data registrada.</p>
    </header>

    <div class="table-container">
      <div class="toolbar">
        <div class="toolbar__status">
          <p id="status-msg" class="status-line"></p>
          <p class="hint" id="count-hint"></p>
        </div>
        <div class="toolbar__actions">
          <input type="search" id="busca-historico" placeholder="Buscar por nome, arquivo ou documento" style="padding: 0.55rem 0.7rem; min-width: 280px; border: 1px solid var(--border); border-radius: 8px;" />
          <button type="button" id="btn-refresh" class="primary">Atualizar</button>
          <button type="button" id="btn-export-pdf">Exportar PDF</button>
          <button type="button" id="btn-export-excel">Exportar Excel</button>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Arquivo</th>
              <th>Nome</th>
              <th>CNPJ/CPF</th>
              <th>Último status</th>
              <th>Vencimento do certificado</th>
              <th>Última data registrada</th>
            </tr>
          </thead>
          <tbody id="tbody-historico"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/static/ui-common.js"></script>
  <script>
    let itensOriginais = [];
      let itensVisiveis = [];

    function esc(v) {
      const d = document.createElement("div");
      d.textContent = v == null ? "" : String(v);
      return d.innerHTML;
    }

    function fmtData(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("pt-BR");
    }

    function fmtDataUtc(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleString("pt-BR", { timeZone: "UTC" }) + " UTC";
    }

    function aplicarBusca() {
      const q = (document.getElementById("busca-historico").value || "").trim().toLowerCase();
      const filtrados = itensOriginais.filter((it) => {
        if (!q) return true;
        const hay = [it.file_name || "", it.nome || "", it.documento || "", it.status_ultimo || ""].join(" ").toLowerCase();
        return hay.includes(q);
      });
      itensVisiveis = filtrados;
      const tb = document.getElementById("tbody-historico");
      tb.innerHTML = filtrados.map((it) => `
        <tr>
          <td>${esc(it.file_name)}</td>
          <td>${esc(it.nome)}</td>
          <td>${esc(it.documento || "—")}</td>
          <td>${esc(it.status_ultimo || "—")}</td>
          <td>${esc(fmtDataUtc(it.vencimento_certificado))}</td>
          <td>${esc(fmtData(it.ultima_data_registrada))}</td>
        </tr>
      `).join("");
      document.getElementById("count-hint").textContent = `${filtrados.length} registro(s) exibido(s)`;
    }

    function exportarExcelVisivel() {
      const headers = ["Arquivo", "Nome", "CNPJ/CPF", "Último status", "Vencimento do certificado", "Última data registrada"];
      const rows = itensVisiveis.map((it) => [
        it.file_name || "",
        it.nome || "",
        it.documento || "",
        it.status_ultimo || "",
        fmtDataUtc(it.vencimento_certificado),
        fmtData(it.ultima_data_registrada),
      ]);
      const all = [headers, ...rows];
      const csv = all
        .map((r) => r.map((c) => `"${String(c ?? "").replace(/"/g, '""')}"`).join(";"))
        .join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "historico_certificados_filtrado.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportarPdfVisivel() {
      const linhas = itensVisiveis
        .map((it) => `
          <tr>
            <td>${esc(it.file_name || "")}</td>
            <td>${esc(it.nome || "")}</td>
            <td>${esc(it.documento || "")}</td>
            <td>${esc(it.status_ultimo || "")}</td>
            <td>${esc(fmtDataUtc(it.vencimento_certificado))}</td>
            <td>${esc(fmtData(it.ultima_data_registrada))}</td>
          </tr>
        `)
        .join("");
      const w = window.open("", "_blank");
      if (!w) return;
      w.document.write(`
        <html>
          <head>
            <meta charset="utf-8" />
            <title>Histórico de certificados filtrado</title>
            <style>
              body { font-family: Segoe UI, Arial, sans-serif; padding: 20px; }
              h1 { margin: 0 0 8px; font-size: 20px; }
              p { margin: 0 0 14px; color: #555; }
              table { width: 100%; border-collapse: collapse; font-size: 11px; }
              th, td { border: 1px solid #d1d5db; padding: 8px; text-align: left; }
              th { background: #f3f4f6; }
            </style>
          </head>
          <body>
            <h1>Histórico de certificados</h1>
            <p>Gerado em ${new Date().toLocaleString("pt-BR")} | Total visível: ${itensVisiveis.length}</p>
            <table>
              <thead>
                <tr>
                  <th>Arquivo</th><th>Nome</th><th>CNPJ/CPF</th><th>Último status</th><th>Vencimento do certificado</th><th>Última data registrada</th>
                </tr>
              </thead>
              <tbody>${linhas}</tbody>
            </table>
          </body>
        </html>
      `);
      w.document.close();
      w.focus();
      w.print();
    }

    async function carregarHistorico() {
      const st = document.getElementById("status-msg");
      st.textContent = "A carregar…";
      const r = await fetch("/api/certificados/historico", { headers: getHeaders() });
      if (!r.ok) {
        st.textContent = `Erro ${r.status}: ${await mensagemCorpoErro(r)}`;
        return;
      }
      const j = await r.json();
      itensOriginais = j.itens || [];
      st.textContent = `Snapshots lidos: ${j.snapshots_lidos || 0}`;
      aplicarBusca();
    }

    document.getElementById("btn-refresh").addEventListener("click", carregarHistorico);
    document.getElementById("busca-historico").addEventListener("input", aplicarBusca);
    document.getElementById("btn-export-excel").addEventListener("click", exportarExcelVisivel);
    document.getElementById("btn-export-pdf").addEventListener("click", exportarPdfVisivel);

    (async function init() {
      const role = localStorage.getItem("user_role");
      if (role === "admin") {
        const elUsers = document.getElementById("nav-users");
        const elConfig = document.getElementById("nav-config");
        if (elUsers) elUsers.style.display = "flex";
        if (elConfig) elConfig.style.display = "flex";
      }
      await carregarHistorico();
    })();
  </script>
</body>
</html>
